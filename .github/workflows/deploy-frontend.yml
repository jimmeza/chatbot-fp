name: Deploy Frontend (Static Web App)

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/deploy-frontend.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  static-web-app-url: ${{ secrets.AZURE_STATIC_WEB_APP_URL }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Desplegar a Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_app_build: true

      - name: Smoke test frontend (opcional)
        if: ${{ env.static-web-app-url != '' }}
        shell: bash
        env:
          SWA_URL: ${{ env.static-web-app-url }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SWA_URL")
          if [ "$STATUS" != "200" ]; then
            echo "La URL de SWA no devolvio 200: $STATUS"
            exit 1
          fi
          echo "Smoke test frontend OK"
